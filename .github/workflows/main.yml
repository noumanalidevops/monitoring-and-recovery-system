name: CI/CD Pipeline - AI Healing System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Python Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            app/requirements.txt
            ai-service/requirements.txt
            auto-healer/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install -r ai-service/requirements.txt
          pip install -r auto-healer/requirements.txt
          pip install httpx

      - name: Validate app health endpoint
        run: |
          python - <<'PY'
          import os
          import sys
          from fastapi.testclient import TestClient
          
          sys.path.insert(0, os.path.abspath("app"))
          from main import app
          
          client = TestClient(app)
          response = client.get("/health")
          assert response.status_code == 200, response.text
          body = response.json()
          assert body.get("status") == "healthy", body
          print("App health endpoint OK")
          PY

      - name: Validate ai-service import and health
        run: |
          python - <<'PY'
          import os
          import sys
          
          sys.path.insert(0, os.path.abspath("ai-service"))
          from main import app
          
          health_route = any(getattr(route, "path", None) == "/health" for route in app.routes)
          assert health_route, "ai-service /health route missing"
          print("AI service import and routes OK")
          PY

      - name: Validate auto-healer import
        run: |
          python - <<'PY'
          import os
          import sys
          
          sys.path.insert(0, os.path.abspath("auto-healer"))
          import main  # noqa: F401
          
          print("Auto-healer import OK")
          PY

      - name: Validate docker-compose syntax
        run: docker compose config

  docker:
    name: Build Containers (and Push on main)
    runs-on: ubuntu-latest
    needs: test

    env:
      SHOULD_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
      IMAGE_REPO: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_USERNAME || 'localbuild' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ env.IMAGE_REPO }}/ai-healing-app:latest

      - name: Build ai-service image
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ env.IMAGE_REPO }}/ai-healing-ai-service:latest

      - name: Build auto-healer image
        uses: docker/build-push-action@v6
        with:
          context: ./auto-healer
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ env.IMAGE_REPO }}/ai-healing-auto-healer:latest

      - name: Build summary
        run: |
          echo "================================"
          echo "CI SUCCESS"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Push images: $SHOULD_PUSH"
          echo "Time: $(date)"
          echo "================================"
