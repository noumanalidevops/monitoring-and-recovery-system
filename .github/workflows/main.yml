name: CI/CD Pipeline — AI Healing System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install App Dependencies
        run: |
          cd app
          pip install -r requirements.txt
          pip install httpx

      - name: Install AI Service Dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt

      - name: Test App Health Endpoint
        run: |
          cd app
          python -c "
          from main import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          response = client.get('/health')
          assert response.status_code == 200
          print('Health check passed!')
          "

      - name: Test AI Service Import
        run: |
          cd ai-service
          python -c "
          from main import app
          print('AI Service OK!')
          "

      - name: Test Auto-Healer Import
        run: |
          cd auto-healer
          pip install requests
          python -c "
          import main
          print('Auto-Healer OK!')
          "

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push App Image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-healing-app:latest

      - name: Build and Push AI Service Image
        uses: docker/build-push-action@v4
        with:
          context: ./ai-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-healing-ai-service:latest

      - name: Build and Push Auto-Healer Image
        uses: docker/build-push-action@v4
        with:
          context: ./auto-healer
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-healing-auto-healer:latest

  deploy:
    name: Deploy Verification
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Verify Docker Compose Config
        run: |
          docker compose config
          echo "Config is valid!"

      - name: Deployment Success
        run: |
          echo "================================"
          echo "DEPLOYMENT SUCCESSFUL!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Time:   $(date)"
          echo "================================"