apiVersion: v1
kind: ServiceAccount
metadata:
  name: auto-healer-sa
  namespace: ai-healing
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auto-healer-role
  namespace: ai-healing
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auto-healer-rb
  namespace: ai-healing
subjects:
  - kind: ServiceAccount
    name: auto-healer-sa
    namespace: ai-healing
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: auto-healer-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-healer
  namespace: ai-healing
  labels:
    app: auto-healer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auto-healer
  template:
    metadata:
      labels:
        app: auto-healer
    spec:
      serviceAccountName: auto-healer-sa
      containers:
        - name: auto-healer
          image: ai-healing-auto-healer:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: AI_SERVICE_URL
              value: http://ai-service:8001
            - name: APP_URL
              value: http://app-clusterip:8000
            - name: CHECK_INTERVAL
              value: "30"
