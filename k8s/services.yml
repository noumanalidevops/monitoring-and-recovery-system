apiVersion: v1
kind: Service
metadata:
  name: app-clusterip
  namespace: ai-healing
spec:
  type: ClusterIP
  selector:
    app: app
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: app-nodeport
  namespace: ai-healing
spec:
  type: NodePort
  selector:
    app: app
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: ai-healing
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - name: http
      protocol: TCP
      port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ai-healing
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      protocol: TCP
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ai-healing
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
