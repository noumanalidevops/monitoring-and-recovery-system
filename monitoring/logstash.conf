# Logstash 3 kaam karta hai: Input lena, Process karna, Output dena

# 1. INPUT — Filebeat se logs lo (port 5044 pe sun)
input {
  beats {
    port => 5044
  }
}

# 2. FILTER — Logs ko parse aur clean karo
filter {
  # JSON format ke logs parse karo
  json {
    source => "message"
  }
  
  # Agar parsing fail ho to message ko as-is rakhna
  if "_jsonparsefailure" in [tags] {
    mutate {
      add_field => { "parse_error" => "true" }
    }
  }
  
  # Timestamp set karo
  date {
    match => [ "time", "yyyy-MM-dd HH:mm:ss,SSS" ]
    target => "@timestamp"
  }
}

# 3. OUTPUT — Elasticsearch mein save karo
output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"  # Roz ka alag index
  }
  
  # Debug ke liye console pe bhi print karo
  stdout {
    codec => rubydebug
  }
}